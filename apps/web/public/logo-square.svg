<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square base -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft glow behind heart -->
  <circle cx="256" cy="260" r="180" fill="url(#glow)"/>

  <!-- Heart: same silhouette as favicon, scaled to 512 viewbox -->
  <path d="M256 400
           C144 320, 80 240, 128 174
           C160 126, 216 134, 256 174
           C296 134, 352 126, 384 174
           C432 240, 368 320, 256 400 Z"
        fill="url(#heart)"/>

  <!-- Tip-notification ping -->
  <circle cx="352" cy="174" r="28" fill="#ffffff" opacity="0.95"/>
  <circle cx="352" cy="174" r="14" fill="#e11d48"/>
</svg>
